<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOK Sport — وضع ملء الشاشة</title>
<style>
  :root{--bg:#0a0e1a;--card:#141d33;--gold:#f5b50a;--gold2:#ffd25f;--accent:#00e0a4;--red:#ff3b5c;--text:#eef2fb;--muted:#8b97b5}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
  body{background:#06090f;color:var(--text);padding:30px 14px;min-height:100vh}
  h2.head{text-align:center;color:var(--gold);font-size:22px;margin-bottom:6px}
  p.sub{text-align:center;color:var(--muted);margin-bottom:30px;font-size:13px}
  .wrap{display:flex;gap:34px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px}
  .cap{font-size:13px;color:var(--muted);font-weight:600}

  /* portrait phone */
  .phone{width:300px;height:650px;background:var(--bg);border-radius:38px;border:9px solid #05080f;box-shadow:0 30px 60px rgba(0,0,0,.6);position:relative;overflow:hidden}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:110px;height:22px;background:#05080f;border-radius:0 0 14px 14px;z-index:50}
  .video{height:175px;background:linear-gradient(135deg,#1b2a52,#0d1426);position:relative;display:grid;place-items:center}
  .video::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(0,224,164,.12),transparent)}
  .pbtn{width:54px;height:54px;border-radius:50%;background:rgba(245,181,10,.92);display:grid;place-items:center;z-index:5;box-shadow:0 8px 26px rgba(245,181,10,.5)}
  .pbtn svg{width:24px;height:24px;fill:#0a0e1a}
  .ctl{position:absolute;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.55);display:grid;place-items:center;z-index:6}
  .ctl svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2}
  .back{top:10px;right:10px}
  .fs{bottom:10px;left:10px}
  .fs.glow{box-shadow:0 0 0 3px rgba(245,181,10,.5)}
  .info{padding:14px}
  .info h3{font-size:15px}.info p{font-size:11px;color:var(--muted);margin-top:4px}
  .qrow{display:flex;gap:7px;padding:0 14px;margin-top:6px}
  .qrow span{padding:6px 12px;border-radius:9px;background:var(--card);font-size:11px;color:var(--muted)}
  .qrow span.on{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0e1a;font-weight:800}
  .arrow{font-size:34px;color:var(--gold);align-self:center;margin-top:280px}

  /* landscape (fullscreen) */
  .land{width:620px;height:300px;background:#000;border-radius:26px;border:9px solid #05080f;box-shadow:0 30px 60px rgba(0,0,0,.6);position:relative;overflow:hidden}
  .land .scene{position:absolute;inset:0;background:linear-gradient(135deg,#1b2a52,#0d1426);display:grid;place-items:center}
  .land .scene::after{content:'';position:absolute;inset:0;background:radial-gradient(500px 300px at 50% 50%,rgba(0,224,164,.14),transparent)}
  .land .pitch{position:absolute;inset:24px;border:2px solid rgba(255,255,255,.12);border-radius:8px}
  .land .pitch::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(255,255,255,.12)}
  .land .pitch::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:70px;height:70px;border:2px solid rgba(255,255,255,.12);border-radius:50%}
  .land .pbtn{position:relative;z-index:5}
  .scoreband{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:12px;padding:7px 16px;display:flex;align-items:center;gap:12px;z-index:6}
  .scoreband .t{font-size:13px;font-weight:800}
  .scoreband .sc{font-size:15px;font-weight:900;color:var(--gold)}
  .scoreband .live{background:var(--red);font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px}
  .seek{position:absolute;bottom:14px;left:54px;right:54px;height:4px;background:rgba(255,255,255,.25);border-radius:3px;z-index:6}
  .seek .f{position:absolute;height:100%;width:62%;background:var(--gold);border-radius:3px}
  .seek .f::after{content:'';position:absolute;right:-4px;top:-3px;width:10px;height:10px;background:var(--gold);border-radius:50%}
</style>
</head>
<body>
<h2 class="head">وضع ملء الشاشة للمشغّل</h2>
<p class="sub">اضغط زر ⛶ في المشغّل → يدور تلقائياً للوضع الأفقي ويخفي أشرطة النظام</p>
<div class="wrap">

  <!-- portrait -->
  <div class="col">
    <div class="phone">
      <div class="notch"></div>
      <div class="video">
        <div class="ctl back"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div class="pbtn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <div class="ctl fs glow"><svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg></div>
      </div>
      <div class="info"><h3>ريال مدريد × برشلونة</h3><p>⚽ دوري أبطال أوروبا</p></div>
      <div class="qrow"><span class="on">Auto</span><span>1080p</span><span>720p</span><span>480p</span></div>
    </div>
    <div class="cap">📱 الوضع العمودي — اضغط ⛶</div>
  </div>

  <div class="arrow">⟸</div>

  <!-- landscape -->
  <div class="col">
    <div class="land">
      <div class="scene">
        <div class="pitch"></div>
        <div class="scoreband">
          <span class="t">RM</span><span class="sc">2 - 1</span><span class="t">FC</span>
          <span class="live">● 67'</span>
        </div>
        <div class="pbtn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <div class="ctl fs" style="bottom:34px;left:14px"><svg viewBox="0 0 24 24"><path d="M9 9H5a2 0 0 0M9 9V5M9 9L4 4M15 9h4M15 9V5M15 9l5-5M9 15H5M9 15v4M9 15l-5 5M15 15h4M15 15v4M15 15l5 5"/></svg></div>
        <div class="seek"><div class="f"></div></div>
      </div>
    </div>
    <div class="cap">🖥️ ملء الشاشة الأفقي — الفيديو يملأ الشاشة بالكامل</div>
  </div>

</div>
</body>
</html>
